<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e2f;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #00cc66;
        }
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 80%;
            max-width: 600px;
            background: #2d2d3a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #444;
        }
        th {
            background: #0f0f1a;
            color: #00cc66;
            font-size: 1.2em;
        }
        tr:hover {
            background: #3a3a4a;
        }
        .refresh-note {
            margin-top: 20px;
            font-size: 0.8em;
            color: #aaa;
        }
    </style>
</head>
